<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>Memory Color Matching</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>

    <div class="bg-grid"></div>

    <header>
      <div class="logo-mark"></div>
      <h1>Memory Color Matching</h1>
      <p class = "subtitle">You must <b>match</b> the two cards of the same color to win the game!</p>
    </header>

    <div class "hud">

      <div class="stat-block">
        <span class="stat-label">Pairs</span>
        <span class="stat-value" id="pairsCount">0/6</span>
      </div>

      <div class = "stat-block">
        <span class="stat-label">Moves</span>
        <span class="stat-value" id="movesCount">0</span>
      </div>

      <div class="stat-block">
        <span class="stat-label">Time</span>
        <span class="stat-value" id="timer">0:00</span>
      </div>
  
    </div>

    <div class="toast-area">
      <div class="toast" id="toast"></div>
    </div>

    <main class="board" id="board" aria-label="Card grid"></main>

    <div class="controls">

      <button class="btn-restart" id="restartBtn" aria-label="Restart game">
        <svg width="16" height="16" viewbox="0 0 16 16" fill="none" currentColor="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1.5 8A6.5 6.5 0 1 0 4 3.5"/>
          <polyline points="1.5 1.5 1.5 4.5 4.5 4.5"/>
        </svg>
      </button>

    </div>

    <div class="win-overlay" id="winOverlay" aria-hidden="'true">
      <div class="win-card">

        <div class="win-confetti" id="confetti"></div>
        <p class="win-eyebrow">You did it!</p>
        <h2 class="win-heading">All Matched</h2>

          <div class="win-stats">

            <div class="win-stat">
              <span class="win-stat-label">Moves</span>
              <span class="win-stat-value" id="finalMoves">-</span>
            </div>

            <div class="win-stat">
              <span class="win-stat-label">Time</span>
              <span class="win-stat-value" id="finalTime">-</span>
            </div>

          </div>

        <button class="btn-play-again" id="playAgainBtn">Play Again</button>

      </div>
    </div>

    <script>
      const colors = [
        "red",
        "orange",
        "yellow",
        "green",
        "blue",
        "purple",
      ];

      const PEEK_DURATION = 4000;
      const LOCK_DURATION = 700;

      let lastClickedColor = null;

      // randomly shuffles the button colors
      function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      }

      // wait for HTML to load
      window.addEventListener("DOMContentLoaded", () => {
        const buttons = document.querySelectorAll(
          "#red1, #red2, #orange1, #orange2, #yellow1, #yellow2, #green1, #green2, #blue1, #blue2, #purple1, #purple2"
        );

        const shuffledColors = [...colors]; // create copy of colors list
        shuffle(shuffledColors);

        buttons.forEach((btn, index) => {
          const color = shuffledColors[index];
          btn.classList.remove(
            "red",
            "orange",
            "yellow",
            "green",
            "blue",
            "purple"
          );
          btn.classList.add(color);
          btn.onclick = () => handleClick(color);

          setTimeout(() => {
            btn.style.backgroundColor = "grey";
          }, 4000);
        });
      });

      function handleClick(color) {
        if (lastClickedColor === null) {
          lastClickedColor = color; // first click
        } else {
          if (lastClickedColor === color) {
            document.getElementById(
              `matched${capitalize(color)}`
            ).innerText = `You matched ${color}!`;
          } else {
            document.getElementById("matchFailed").innerText =
              "Not a match! Game over :(";
            document.getElementById("matchedRed").innerText = "";
            document.getElementById("matchedOrange").innerText = "";
            document.getElementById("matchedYellow").innerText = "";
            document.getElementById("matchedGreen").innerText = "";
            document.getElementById("matchedBlue").innerText = "";
            document.getElementById("matchedPurple").innerText = "";
          }
          lastClickedColor = null;
        }
      }

      function capitalize(str) {
        return str.charAt(0).toUpperCase() + str.slice(1);
      }
    </script>
  </body>
</html>
