<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>Memory Color Matching</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>

    <div class="bg-grid"></div>

    <header>
      <div class="logo-mark"></div>
      <h1>Memory Matching</h1>
      <p class="subtitle">You must <b>match</b> the two cards of the same color to win the game!</p>
    </header>

    <div class="hud">

      <div class="stat-block">
        <span class="stat-label">Pairs</span>
        <span class="stat-value" id="pairsCount">0/6</span>
      </div>

      <div class="stat-block">
        <span class="stat-label">Moves</span>
        <span class="stat-value" id="movesCount">0</span>
      </div>

      <div class="stat-block">
        <span class="stat-label">Time</span>
        <span class="stat-value" id="timer">0:00</span>
      </div>

    </div>

    <div class="toast-area">
      <div class="toast" id="toast"></div>
    </div>

    <main class="board" id="board" aria-label="Card grid"></main>

    <div class="controls">

      <button class="btn-restart" id="restartBtn" aria-label="Restart game">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1.5 8A6.5 6.5 0 1 0 4 3.5"/>
          <polyline points="1.5 1.5 1.5 4.5 4.5 4.5"/>
        </svg>
        New Game
      </button>

    </div>

    <div class="win-overlay" id="winOverlay" aria-hidden="true">
      <div class="win-card">

        <div class="win-confetti" id="confetti"></div>
        <p class="win-eyebrow">You did it!</p>
        <h2 class="win-heading">All Matched</h2>

        <div class="win-stats">

          <div class="win-stat">
            <span class="win-stat-label">Moves</span>
            <span class="win-stat-value" id="finalMoves">-</span>
          </div>

          <div class="win-stat">
            <span class="win-stat-label">Time</span>
            <span class="win-stat-value" id="finalTime">-</span>
          </div>

        </div>

        <button class="btn-play-again" id="playAgainBtn">Play Again</button>

      </div>
    </div>

    <script>
      const COLORS = [
        "red",
        "orange",
        "yellow",
        "green",
        "blue",
        "purple",
      ];

      const PEEK_DURATION = 3500;
      const LOCK_DURATION = 700;

      const board = document.getElementById("board");
      const toastEl = document.getElementById("toast");
      const winOverlay = document.getElementById("winOverlay");
      const pairsEl = document.getElementById("pairsCount");
      const movesEl = document.getElementById("movesCount");
      const timerEl = document.getElementById("timer");
      const finalMovesEl = document.getElementById("finalMoves");
      const finalTimeEl = document.getElementById("finalTime");
      const confettiEl = document.getElementById("confetti");

      let selected = null;
      let locked = false;
      let pairs = 0;
      let moves = 0;
      let timerInterval = null;
      let seconds = 0;
      let started = false;

      let cards = [];

      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function formatTime(s) {
        return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
      }

      function startTimer() {
        clearInterval(timerInterval);
        seconds = 0;
        timerEl.textContent = "0:00";
        timerInterval = setInterval(() => {
          seconds++;
          timerEl.textContent = formatTime(seconds);
        }, 1000);
      }

      function showToast(msg, type = '') {
        toastEl.textContent = msg;
        toastEl.className = `toast show${type ? ` ${type}` : ''}`;
        clearTimeout(toastEl._timeout);
        toastEl._timeout = setTimeout(() => {
          toastEl.className = "toast";
        }, 2000);
      }

      function makeConfetti() {
        confettiEl.innerHTML = '';
        const cols = ["#f87171","#fb923c","#facc15","#4ade80","#60a5fa","#c084fc","#f472b6"];

        for (let i = 0; i < 48; i++) {
          const el = document.createElement("div");
          el.className = "confetti-piece " + (i % 2 === 0 ? "circle" : "rect");

          el.style.cssText = `
            left: ${Math.random() * 100}%;
            background: ${cols[i % cols.length]};
            animation-delay: ${Math.random() * 0.6}s;
            animation-duration: ${0.8 + Math.random() * 0.8}s;
            width: ${6 + Math.random() * 8}px;
            height: ${6 + Math.random() * 8}px;
          `;

          confettiEl.appendChild(el);
        }
      }

      function createCard(color, index) {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.color = color;
        card.dataset.index = index;
        card.setAttribute("role", "button");
        card.setAttribute("aria-label", "Card " + (index + 1));
        card.tabIndex = 0;

        card.innerHTML = `
          <div class="card-inner">
            <div class="card-front">
              <div class="card-pip color-${color}"></div>
            </div>
            <div class="card-back">
              <div class="card-question"></div>
            </div>
          </div>
        `;

        card.addEventListener("click", () => handleClick(card));
        card.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") handleClick(card); });
        return card;
      }

      function initGame() {
        clearInterval(timerInterval);
        selected = null;
        locked = false;
        pairs = 0;
        moves = 0;
        started = false;
        seconds = 0;

        pairsEl.textContent = `0/${COLORS.length}`;
        movesEl.textContent = "0";
        timerEl.textContent = "0:00";
        winOverlay.classList.remove("show");
        winOverlay.setAttribute("aria-hidden", "true");
        board.innerHTML = '';
        cards = [];

        const deck = shuffle([...COLORS, ...COLORS]);
        deck.forEach((color, index) => {
          const card = createCard(color, index);
          board.appendChild(card);
          cards.push(card);
        });

        locked = true;
        cards.forEach(card => card.classList.add("peeking"));
        setTimeout(() => {
          cards.forEach(c => c.classList.remove("peeking"));
          locked = false;
        }, PEEK_DURATION);
      }

      function handleClick(card) {
        if (locked) return;
        if (card.classList.contains("matched")) return;
        if (card === selected) return;
        if (card.classList.contains("flipped") && !selected) return;

        if (!started) {
          startTimer();
          started = true;
        }

        card.classList.add("flipped");

        if (!selected) {
          selected = card;
          return;
        }

        moves++;
        movesEl.textContent = moves;
        locked = true;

        const a = selected;
        const b = card;
        selected = null;

        // FIX: changed == to === (strict equality) for reliable string comparison
        if (a.dataset.color === b.dataset.color) {
          a.classList.add("matched");
          b.classList.add("matched");
          pairs++;
          pairsEl.textContent = `${pairs}/${COLORS.length}`;
          locked = false;

          if (pairs === COLORS.length) {
            clearInterval(timerInterval);
            setTimeout(() => showWin(), 400);
          } else {
            showToast("Nice match!", "success");
          }

        } else {
          showToast("Not quite, try again!", "error");
          setTimeout(() => {
            a.classList.remove("flipped");
            b.classList.remove("flipped");
            locked = false;
          }, LOCK_DURATION);
        }
      }

      function showWin() {
        makeConfetti();
        finalMovesEl.textContent = moves;
        finalTimeEl.textContent = formatTime(seconds);
        winOverlay.classList.add("show");
        winOverlay.setAttribute("aria-hidden", "false");
      }

      document.getElementById("restartBtn").addEventListener("click", initGame);
      document.getElementById("playAgainBtn").addEventListener("click", initGame);

      initGame();

    </script>
  </body>
</html>
